# Netlify site config for app.investorautomationos.com
#
# Setup: create a second Netlify site from the same GitHub repo.
#   Site settings → Build & deploy:
#     Base directory:  app
#     Build command:   pnpm install && pnpm build
#     Publish dir:     app/dist
#     Functions dir:   app/netlify/functions
#   Site settings → Domain management:
#     Add custom domain: app.investorautomationos.com
#     Add CNAME in DNS:  app → <netlify-site>.netlify.app

[build]
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Friday mailer digest — fires 13:00 UTC = 8am CDT (drifts to 7am during CST,
# Nov-Mar; acceptable for a once-a-week "~8am CT" heads-up email).
[functions."mailer-digest"]
  schedule = "0 13 * * 5"

# SPA catch-all — client-side router handles all paths
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
